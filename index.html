<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bangla Taka</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    color: #fff;
    background: url('https://i.ibb.co/7QpKsCX/bg.jpg') no-repeat center center/cover;
}

.container {
    padding-top: 50px;
}

h1 {
    font-size: 35px;
    margin-bottom: 10px;
}

.dev {
    font-size: 14px;
    margin-bottom: 30px;
    opacity: 0.8;
}

button {
    display: block;
    width: 80%;
    max-width: 300px;
    margin: 10px auto;
    padding: 15px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #00c853;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #009624;
}
</style>

<script>
// 🔥 AUTO AD (page load e open hobe)
window.onload = function() {
    setTimeout(function(){
        window.open("YOUR_KADAM_DIRECT_LINK", "_blank");
    }, 3000);
};

// 🔘 Button functions
function watchAd() {
    window.open("YOUR_KADAM_DIRECT_LINK", "_blank");
}

function earnMore() {
    window.open("YOUR_SECOND_AD_LINK", "_blank");
}

function withdraw() {
    alert("Minimum 100 Tk required!");
}

function support() {
    window.open("https://t.me/YOUR_SUPPORT_USERNAME", "_blank");
}
</script>

</head>

<body>

<div class="container">
    <h1>💰 Bangla Taka</h1>
    <div class="dev">Developer: Amir Hamza</div>

    <button onclick="watchAd()">🎥 Watch Ad</button>
    <button onclick="earnMore()">💸 Earn More</button>
    <button onclick="withdraw()">🏧 Withdraw</button>
    <button onclick="support()">📞 Support</button>
</div>

</body>
</html>
